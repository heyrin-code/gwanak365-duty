name: 장혜린 출근 알림

on:
  schedule:
    - cron: '30 3 * * *'   # 매일 오후 12:30 KST (= 03:30 UTC)
  workflow_dispatch:         # 수동 실행 (테스트용)

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: schedule.json 확인
        id: check
        run: |
          if [ ! -f schedule.json ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 알림 전송
        if: steps.check.outputs.skip == 'false'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: node notify.js
